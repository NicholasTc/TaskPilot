<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskPilot - Dashboard Concept</title>
    <style>
      :root {
        --bg: #f3f5f8;
        --surface: rgba(255, 255, 255, 0.86);
        --line: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0a84ff;
        --success: #16a34a;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #e8f3ff 0%, transparent 36%),
          radial-gradient(circle at 100% 20%, #f4ebff 0%, transparent 32%),
          var(--bg);
      }

      .shell {
        max-width: 1140px;
        margin: 0 auto;
        padding: 1rem;
      }

      .nav {
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(12px);
        border-radius: 1rem;
        padding: 0.7rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .nav-meta {
        display: flex;
        align-items: center;
        gap: 0.66rem;
      }

      .pill {
        padding: 0.36rem 0.72rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 0.85rem;
        color: var(--muted);
        background: #fff;
      }

      .layout {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: 1.9fr 1fr;
        gap: 1rem;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 1.25rem;
        padding: 1rem;
        backdrop-filter: blur(12px);
      }

      .panel h2 {
        margin: 0;
        font-size: 1.03rem;
        letter-spacing: -0.01em;
      }

      .sub {
        margin-top: 0.22rem;
        color: var(--muted);
        font-size: 0.89rem;
      }

      .task-input {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.6rem;
      }

      .task-input input {
        border: 1px solid var(--line);
        border-radius: 0.9rem;
        background: #fff;
        min-height: 2.75rem;
        padding: 0 0.85rem;
        font-size: 0.95rem;
        outline: none;
      }

      .task-input input:focus {
        border-color: rgba(10, 132, 255, 0.46);
        box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.16);
      }

      .btn {
        border: none;
        border-radius: 0.88rem;
        min-height: 2.75rem;
        padding: 0 1rem;
        font-weight: 600;
        background: linear-gradient(180deg, #38a0ff 0%, #0079ff 100%);
        color: #fff;
        cursor: pointer;
      }

      .task-list {
        margin-top: 0.9rem;
        display: grid;
        gap: 0.6rem;
      }

      .task {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 0.88rem;
        padding: 0.75rem;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 0.72rem;
        align-items: center;
      }

      .dot {
        width: 1.1rem;
        height: 1.1rem;
        border-radius: 50%;
        border: 2px solid #d1d9e6;
      }

      .dot.done {
        border-color: var(--success);
        background: var(--success);
        box-shadow: inset 0 0 0 3px #fff;
      }

      .task-title {
        font-size: 0.95rem;
      }

      .task-title.done {
        color: var(--muted);
        text-decoration: line-through;
      }

      .mini-btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--danger);
        min-height: 2rem;
        padding: 0 0.64rem;
        border-radius: 0.62rem;
        font-size: 0.84rem;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      .timer {
        text-align: center;
        padding: 1.3rem 1rem;
      }

      .time {
        margin: 0.25rem 0 0.8rem;
        font-size: 2.3rem;
        letter-spacing: -0.03em;
      }

      .timer-actions {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
      }

      .ghost {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 0.7rem;
        min-height: 2.2rem;
        padding: 0 0.8rem;
      }

      .reminder {
        display: grid;
        gap: 0.6rem;
      }

      .reminder-item {
        border: 1px solid var(--line);
        border-radius: 0.8rem;
        background: #fff;
        padding: 0.7rem;
      }

      .reminder-item strong {
        display: block;
        font-size: 0.92rem;
      }

      .reminder-item span {
        font-size: 0.82rem;
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="nav">
        <div class="brand">TaskPilot</div>
        <div class="nav-meta">
          <span class="pill">Wednesday, Apr 15</span>
          <span class="pill">3 tasks left</span>
        </div>
      </header>

      <div class="layout">
        <section class="panel">
          <h2>Today</h2>
          <p class="sub">Track what matters. Keep it light and focused.</p>

          <div class="task-input">
            <input type="text" placeholder="Add a task..." />
            <button class="btn">Add</button>
          </div>

          <div class="task-list">
            <article class="task">
              <div class="dot"></div>
              <div class="task-title">Finish TypeScript assignment</div>
              <button class="mini-btn">Delete</button>
            </article>

            <article class="task">
              <div class="dot"></div>
              <div class="task-title">Review math notes for quiz</div>
              <button class="mini-btn">Delete</button>
            </article>

            <article class="task">
              <div class="dot done"></div>
              <div class="task-title done">Prepare project status report</div>
              <button class="mini-btn">Delete</button>
            </article>
          </div>
        </section>

        <aside class="stack">
          <section class="panel timer">
            <h2>Focus Session</h2>
            <div class="time">24:58</div>
            <div class="timer-actions">
              <button class="btn">Start</button>
              <button class="ghost">Pause</button>
              <button class="ghost">Reset</button>
            </div>
          </section>

          <section class="panel reminder">
            <h2>Reminders</h2>
            <article class="reminder-item">
              <strong>Group meeting</strong>
              <span>Today - 6:00 PM</span>
            </article>
            <article class="reminder-item">
              <strong>Submit lab report</strong>
              <span>Tomorrow - 10:00 AM</span>
            </article>
          </section>
        </aside>
      </div>
    </div>
  </body>
</html>
